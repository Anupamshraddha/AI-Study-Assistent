<!DOCTYPE html>
<html>

<head>

<title>Dashboard - StudyAI</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    background:#020617;
    color:white;
    min-height:100vh;

}


/* Heading */

h1{

    text-align:center;
    margin-top:50px;
    font-size:45px;
    color:#38bdf8;

}



/* Cards container */

.grid{

    width:85%;
    margin:60px auto;

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:30px;

}



/* Dashboard cards */

.grid a{


    height:180px;

    background:#1e293b;

    border-radius:25px;


    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;


    text-decoration:none;

    color:white;


    font-size:24px;


    box-shadow:0 10px 25px rgba(0,0,0,0.4);


    transition:0.3s;


}




.grid a:hover{


    background:#2563eb;

    transform:translateY(-10px);


    box-shadow:0 15px 40px #2563eb;


}




/* Mobile */

@media(max-width:900px){


.grid{

    grid-template-columns:1fr;

}


h1{

    font-size:32px;

}



}


</style>


</head>



<body>



<h1>
Welcome to StudyAI 🚀
</h1>




<div class="grid">




<a href="/notes">

📄

<br>

</a>

</a>

</div>

    <script src="https://files.bpcontent.cloud/2026/06/14/17/20260614174352-08BKETUF.js" defer></script>

    <script>
        window.addEventListener("load", () => {
            window.botpress.init({
                configUrl: "https://files.bpcontent.cloud/2026/06/14/17/20260614174352-FFHHC4QM.json",
                // CRITICAL: This tells Botpress to load INSIDE your container instead of floating on the screen
                container: "#webchat-container", 
                layout: "embedded" 
            });

            window.botpress.on("webchat:ready", () => {
                window.botpress.open();
            });
        });
    </script>

</body>

</html>
