<!DOCTYPE html>
<html>

<head>
    <title>Signup - StudyAI</title>

    <style>
        /* ===== GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
        }

        /* ===== FORM BOX ===== */
        .form-box {
            width: 380px;
            padding: 35px 30px;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);

            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);

            text-align: center;

            animation: fadeIn 0.6s ease-in-out;
        }

        /* ===== TITLE ===== */
        .form-box h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 26px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        /* ===== INPUTS ===== */
        .form-box input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 14px;

            background: rgba(255, 255, 255, 0.15);
            color: #fff;

            transition: 0.3s;
        }

        .form-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-box input:focus {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
        }

        /* confirm password highlight */
        .form-box input[name="confirm"]:focus {
            border: 2px solid #38bdf8;
        }

        /* ===== BUTTON ===== */
        .form-box button {
            width: 100%;
            padding: 12px;

            margin-top: 12px;

            border: none;
            border-radius: 10px;

            background: linear-gradient(90deg, #4f46e5, #06b6d4);
            color: white;

            font-size: 16px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.3s ease;
        }

        .form-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
        }

        /* ===== TEXT ===== */
        .form-box p {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            line-height: 1.5;
        }

        .form-box a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        .form-box a:hover {
            text-decoration: underline;
        }

        /* ===== PASSWORD MATCH MESSAGE ===== */
        .match {
            font-size: 12px;
            margin-top: 5px;
            color: #f87171;
        }

        /* ===== ANIMATION ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="form-box">

        <h1>Create Account 🚀</h1>

        <form method="POST" action="/signup">

            <input type="text" name="name" placeholder="Name" required>

            <input type="email" name="email" placeholder="Email" required>

            <input type="password" name="password" id="password" placeholder="Password" required>

            <input type="password" name="confirm" id="confirm" placeholder="Confirm Password" required>

            <div id="msg" class="match"></div>

            <button type="submit">Signup</button>

            <p>
                Already have account?
                <a href="/login">Login</a>
                
            </p>
            <p>
                
                <a href="/">Back</a>
                
            </p>

        </form>

    </div>

    <script>
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirm");
        const msg = document.getElementById("msg");

        confirmPassword.addEventListener("input", function () {
            if (confirmPassword.value !== password.value) {
                msg.textContent = "Passwords do not match";
                confirmPassword.style.border = "2px solid #ef4444";
            } else {
                msg.textContent = "Passwords match";
                confirmPassword.style.border = "2px solid #22c55e";
            }
        });
    </script>

</body>

</html>
