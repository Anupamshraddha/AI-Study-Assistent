<!DOCTYPE html>

<html>

<head>

<title>Signup</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>


<body>


<div class="form-box">


<h1>Create Account 🚀</h1>



<form method="POST" action="/signup">



<input 
type="text"
name="name"
placeholder="Name"
required>




<input 
type="email"
name="email"
placeholder="Email"
required>




<input 
type="password"
name="password"
placeholder="Password"
required>




<input 
type="password"
name="confirm"
placeholder="Confirm Password"
required>




<button type="submit">

Signup

</button>




<p>

Already have account?

<a href="/login">

Login

</a>

</p>



</form>


</div>


</body>

</html>
