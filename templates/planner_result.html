<!DOCTYPE html>

<html>

<head>

<title>Your Study Plan</title>


<style>

body{

background:#667eea;

font-family:Arial;

padding:30px;

}



.container{

max-width:800px;

margin:auto;

}


.card{

background:white;

padding:25px;

margin:20px 0;

border-radius:20px;

box-shadow:0 15px 30px #0003;

}


.day{

font-size:25px;

font-weight:bold;

color:#667eea;

}



.task{

background:#f3f4ff;

padding:12px;

margin:10px;

border-radius:12px;

}


</style>


</head>


<body>


<div class="container">


<h1 style="color:white;text-align:center">

🤖 AI Generated Study Plan

</h1>




{% for item in plan %}


<div class="card">


<div class="day">

📅 {{item.day}}

</div>



{% for task in item.tasks %}


<div class="task">

✓ {{task}}

</div>


{% endfor %}



</div>



{% endfor %}



</div>


</body>


</html>
