<!DOCTYPE html>

<html>

<head>

<title>AI Flashcards</title>


<style>


body{

margin:0;

font-family:'Segoe UI',sans-serif;

background:
linear-gradient(135deg,#667eea,#764ba2);

min-height:100vh;

padding:40px;

}



.header{

text-align:center;

color:white;

}



.header h1{

font-size:40px;

}




.grid{


display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:25px;


max-width:1100px;

margin:40px auto;


}




.card{


background:white;

border-radius:25px;


padding:25px;


box-shadow:
0 20px 40px rgba(0,0,0,.2);


transition:.3s;


animation:show .4s;


}



.card:hover{


transform:translateY(-10px);

}




@keyframes show{


from{

opacity:0;

transform:scale(.8);

}


to{

opacity:1;

transform:scale(1);

}


}





.card-title{


font-size:25px;

font-weight:bold;


color:#667eea;


margin-bottom:20px;


}




.fact{


background:#f4f6ff;


padding:14px;


border-radius:15px;


margin:12px 0;


font-size:16px;


}



.back{


display:block;

width:180px;

margin:30px auto;


text-align:center;


background:white;

padding:14px;


border-radius:20px;


text-decoration:none;


color:#667eea;


font-weight:bold;


}




</style>


</head>



<body>




<div class="header">


<h1>
🤖 AI Generated Flashcards
</h1>


<p>
Smart revision cards created by AI
</p>


</div>






<div class="grid">





{% for card in cards %}



<div class="card">


<div class="card-title">


📌 {{card.title}}


</div>



{% for fact in card.facts %}



<div class="fact">

✓ {{fact}}

</div>


{% endfor %}



</div>




{% endfor %}




</div>






<a class="back" href="/flashcards">

Create More

</a>





</body>

</html>
