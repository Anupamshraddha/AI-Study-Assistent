<!DOCTYPE html>

<html>

<head>

<title>Page Not Found</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    height:100vh;
    background:#020617;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

}



.error-box{


    width:500px;

    background:#1e293b;

    padding:50px;

    border-radius:25px;

    text-align:center;

    box-shadow:
    0 0 30px #2563eb;


}



.error-box h1{


    font-size:90px;

    color:#38bdf8;

}



.error-box h2{


    font-size:35px;

    margin:20px 0;

}



.error-box p{


    color:#cbd5e1;

    font-size:18px;

    margin-bottom:30px;

}




.home-btn{


    display:inline-block;

    padding:15px 30px;

    background:#2563eb;

    color:white;

    text-decoration:none;

    border-radius:25px;

    transition:.3s;

}



.home-btn:hover{


    background:#1d4ed8;

    transform:scale(1.05);

}



</style>


</head>


<body>



<div class="error-box">


<h1>
404
</h1>


<h2>
Oops! Page Not Found 😢
</h2>


<p>
The page you are looking for does not exist.
</p>



<a class="home-btn" href="/">
Go Back Home
</a>



</div>



</body>

</html>
