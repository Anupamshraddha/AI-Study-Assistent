<!DOCTYPE html>

<html>

<head>

<title>Your AI Quiz</title>


<style>

body{

background:#667eea;
font-family:Arial;
padding:30px;

}


.container{

max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:25px;

}


.card{

background:#f5f7ff;
padding:20px;
margin:20px 0;
border-radius:15px;

}


.option{

background:white;
padding:10px;
margin:8px;
border-radius:10px;

}


.answer{

color:green;
font-weight:bold;
margin-top:15px;

}


.exp{

background:#fff3cd;
padding:10px;
border-radius:10px;

}


</style>

</head>



<body>


<div class="container">


<h1>
🤖 AI Generated Quiz
</h1>



{% for q in quiz %}


<div class="card">


<h3>

{{loop.index}}.
{{q.question}}

</h3>



{% for option in q.options %}


<div class="option">

◉ {{option}}

</div>


{% endfor %}




<div class="answer">

✅ Answer:
{{q.answer}}

</div>



<div class="exp">

💡 {{q.explanation}}

</div>



</div>


{% endfor %}




<a href="/mcq">

<button>

Create New Quiz

</button>
<br></br>
<a href="/dashboard"> Back</a>
</a>



</div>


</body>


</html>
