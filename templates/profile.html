<!DOCTYPE html>

<html>

<head>

<title>Profile</title>


<style>

body{

background:#667eea;

font-family:Arial;

padding:40px;

}



.card{

max-width:500px;

margin:auto;

background:white;

padding:30px;

border-radius:25px;

text-align:center;

}



img{

width:100px;

height:100px;

border-radius:50%;

}



button{

padding:12px 30px;

border:none;

border-radius:20px;

background:#667eea;

color:white;

}



</style>


</head>


<body>


<div class="card">


<h1>
👤 Profile
</h1>


<h2>
{{user.name}}
</h2>


<p>
📧 {{user.email}}
</p>


<br>


<a href="/logout">

<button>
Logout
</button>

</a>



</div>


</body>


</html>
