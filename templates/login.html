<!DOCTYPE html>
<html>

<head>
<title>Login - StudyAI</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>


<body>


<div class="form-box">


<h1>Login 🤖</h1>


<form method="POST" action="/login">



<input 
type="email"
name="email"
placeholder="Email"
required>



<input 
type="password"
name="password"
placeholder="Password"
required>



<button type="submit">
Login
</button>



<p>
New user?
<a href="/signup">
Create Account
</a>
</p>



</form>


</div>


</body>

</html>
