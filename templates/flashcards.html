<!DOCTYPE html>

<html>

<head>

<title>AI Flashcard Generator</title>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}



body{

min-height:100vh;

background:
linear-gradient(135deg,#667eea,#764ba2);

display:flex;
justify-content:center;
align-items:center;

padding:30px;

}



.container{


width:500px;

background:white;

padding:35px;

border-radius:30px;


box-shadow:
0 20px 50px rgba(0,0,0,.25);


animation:show .5s;


}



@keyframes show{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}




.logo{

text-align:center;

font-size:70px;

}



h1{

text-align:center;

color:#333;

margin:15px 0;

}



p{

text-align:center;

color:#666;

margin-bottom:25px;

}




.input-box{

margin-top:20px;

}



label{

font-weight:bold;

color:#444;

}



input{


width:100%;

padding:14px;

margin-top:8px;


border-radius:14px;

border:1px solid #ddd;


font-size:16px;


outline:none;

}



input:focus{

border-color:#667eea;

box-shadow:0 0 10px #667eea55;

}





button{


width:100%;

margin-top:25px;

padding:15px;


border:none;

border-radius:15px;


background:
linear-gradient(135deg,#667eea,#764ba2);


color:white;

font-size:18px;


cursor:pointer;


transition:.3s;


}



button:hover{

transform:translateY(-3px);

}





.loading{


display:none;

text-align:center;

margin-top:20px;

color:#667eea;

font-weight:bold;

}



.spinner{


width:35px;

height:35px;


border:4px solid #ddd;

border-top:4px solid #667eea;


border-radius:50%;


margin:auto;


animation:spin 1s linear infinite;

}



@keyframes spin{

100%{

transform:rotate(360deg);

}

}





.error{


margin-top:20px;

background:#fee2e2;

padding:12px;

border-radius:12px;

color:red;

text-align:center;

}




</style>


</head>



<body>




<div class="container">



<div class="logo">
🧠
</div>



<h1>

AI Study Flashcards

</h1>



<p>

Create smart revision cards using AI

</p>





<form method="POST"
onsubmit="showLoading()">





<div class="input-box">

<label>
Subject
</label>


<input

name="subject"

placeholder="Example: Python"

required>


</div>







<div class="input-box">


<label>
Topic
</label>


<input

name="topic"

placeholder="Example: Functions"

required>


</div>







<div class="input-box">


<label>
Number of Cards
</label>


<input

name="count"

type="number"

value="5"

min="1"

max="20"

required>


</div>






<button>

✨ Generate Flashcards

</button>

<br></br>
<a href="/dashboard"> Back</a>



<div class="loading" id="loading">


<div class="spinner"></div>

<br>

AI is creating cards...


</div>




</form>






{% if error %}


<div class="error">

⚠️ {{error}}

</div>


{% endif %}




</div>







<script>


function showLoading(){

document.getElementById("loading")
.style.display="block";

}


</script>




</body>


</html>
