<!DOCTYPE html>

<html>

<head>

<title>StudyAI 🤖</title>


<style>


*{
box-sizing:border-box;
}



body{

margin:0;

height:100vh;

font-family:"Segoe UI",Arial;

background:
linear-gradient(135deg,#020617,#1e293b);

color:white;

display:flex;

}




/* SIDEBAR */


.sidebar{

width:280px;

height:100vh;

background:#020617;

padding:20px;

display:flex;

flex-direction:column;

border-right:1px solid #334155;

}



.logo{

text-align:center;

margin-bottom:20px;

}





.new-chat{

display:block;

text-align:center;

background:#22c55e;

padding:12px;

border-radius:12px;

color:white;

text-decoration:none;

margin-bottom:12px;

transition:.3s;

}


.new-chat:hover{

background:#16a34a;

}





.chat-list{

flex:1;

overflow-y:auto;

}






.chat-item{

display:flex;

gap:5px;

margin-bottom:10px;

align-items:center;

}




.chat-link{


flex:1;

background:#1e293b;

padding:12px;

border-radius:12px;

color:white;

text-decoration:none;

overflow:hidden;

white-space:nowrap;

text-overflow:ellipsis;

}



.chat-link:hover{

background:#334155;

}






.delete{


background:#ef4444;

padding:10px;

border-radius:10px;

color:white;

text-decoration:none;

}



.delete:hover{

background:#dc2626;

}






/* bottom dashboard */


.bottom-menu{

margin-top:auto;

}



.dashboard-btn{

display:block;

text-align:center;

background:#334155;

padding:14px;

border-radius:12px;

color:white;

text-decoration:none;

transition:.3s;

}



.dashboard-btn:hover{

background:#475569;

}







/* MAIN */


.container{

flex:1;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}







.chatbox{

width:700px;

height:88vh;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border-radius:25px;

padding:20px;

display:flex;

flex-direction:column;

box-shadow:0 20px 50px rgba(0,0,0,.4);

}






.header{

border-bottom:1px solid #334155;

padding-bottom:15px;

}



.status{

color:#22c55e;

font-size:13px;

}







/* MESSAGES */


.messages{

flex:1;

overflow-y:auto;

padding:20px;

}



.messages::-webkit-scrollbar{

width:6px;

}



.messages::-webkit-scrollbar-thumb{

background:#475569;

border-radius:20px;

}







.msg{

max-width:75%;

padding:14px;

margin:15px 0;

border-radius:18px;

line-height:1.5;

}




.user{

background:#2563eb;

margin-left:auto;

border-bottom-right-radius:5px;

}





.assistant{

background:#334155;

margin-right:auto;

border-bottom-left-radius:5px;

}




.name{

font-size:12px;

opacity:.7;

}








/* INPUT */


form{

display:flex;

gap:10px;

padding-top:10px;

}



input{

flex:1;

padding:15px 20px;

border-radius:30px;

border:none;

outline:none;

font-size:15px;

}




button{

width:110px;

border:none;

border-radius:30px;

background:#6366f1;

color:white;

cursor:pointer;

font-size:16px;

}



button:hover{

background:#4f46e5;

}







@media(max-width:800px){


.sidebar{

display:none;

}


.chatbox{

height:95vh;

}


}




</style>


</head>



<body>





<!-- SIDEBAR -->

<div class="sidebar">



<h2 class="logo">

🤖 StudyAI

</h2>





<a class="new-chat" href="/new_chat">

➕ New Chat

</a>






<div class="chat-list">



{% for c in chats %}



<div class="chat-item">



<a class="chat-link"
href="/load_chat/{{c.id}}">

💬 {{c.title}}

</a>




<a class="delete"

href="/delete_chat/{{c.id}}"

onclick="return confirm('Delete this chat?')">

🗑

</a>



</div>




{% endfor %}



</div>






<!-- FIXED BOTTOM -->

<div class="bottom-menu">


<a class="dashboard-btn" href="/dashboard">

⬅ Dashboard

</a>


</div>






</div>










<!-- CHAT -->



<div class="container">



<div class="chatbox">





<div class="header">


<h2>

Study Assistant 🤖

</h2>


<div class="status">

● Online

</div>


</div>









<div class="messages" id="messages">





{% for m in messages %}




<div class="msg {{m.role}}">



<div class="name">


{% if m.role=="user" %}

You

{% else %}

AI Assistant

{% endif %}


</div>




{{m.content}}



</div>





{% endfor %}




</div>









<form method="POST">



<input

name="message"

placeholder="Ask anything about your studies..."

autocomplete="off"

required>




<button>

Send 🚀

</button>



</form>








</div>





</div>







<script>


let box=document.getElementById("messages");

box.scrollTop=box.scrollHeight;


</script>





</body>


</html>
