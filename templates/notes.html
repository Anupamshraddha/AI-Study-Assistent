<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>AI PDF Notes Generator 📄</title>


<style>


body{

    font-family:Arial, Helvetica, sans-serif;

    background:#020617;

    color:white;

    min-height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

}



.container{

    background:#1e293b;

    padding:40px;

    width:90%;

    max-width:500px;

    border-radius:25px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.5);

}



h1{

    font-size:35px;

}



p{

    color:#cbd5e1;

}



form{

    margin-top:30px;

}



input[type=file]{


    width:100%;

    padding:15px;

    background:#0f172a;

    color:white;

    border-radius:10px;

    margin-bottom:20px;


}



button{


    width:100%;

    padding:15px;


    background:#2563eb;

    color:white;

    border:none;

    border-radius:12px;


    font-size:18px;

    cursor:pointer;


}



button:hover{

    background:#1d4ed8;

}




.message{


    margin-top:25px;

    background:#065f46;

    padding:15px;

    border-radius:10px;


}



</style>


</head>



<body>



<div class="container">


<h1>
🤖 AI PDF Notes Generator
</h1>


<p>
Upload your PDF and get AI generated notes
</p>




<form method="POST" enctype="multipart/form-data">


<input

type="file"

name="pdf"

accept=".pdf"

required

>



<button type="submit">

Generate Notes 📄

</button>



</form>





{% if message %}

<div class="message">

{{message}}

</div>

{% endif %}



</div>




</body>


</html>
